<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>KidTrack</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#1D9E75;--green-dark:#0F6E56;--green-light:#E1F5EE;
  --amber:#FA9E2C;--amber-light:#FFF3DC;
  --blue:#378ADD;--blue-light:#E6F1FB;
  --red:#E24B4A;--red-light:#FFEBEE;
  --bg:#F8F7F2;--card:#FFFFFF;--text:#1A1A1A;--muted:#7A7870;
  --border:#E8E5D8;--radius:16px;
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:0;}
#app{width:100%;max-width:430px;min-height:100vh;background:var(--bg);position:relative;display:flex;flex-direction:column;}
.screen{display:none;flex-direction:column;flex:1;min-height:100vh;}
.screen.active{display:flex;}

/* LOGIN */
.login-page{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;background:linear-gradient(160deg,#FFFDF5,#E1F5EE,#FFF3DC);}
.login-logo{text-align:center;margin-bottom:2rem;}
.login-icon{font-size:3rem;display:block;margin-bottom:8px;}
.login-logo h1{font-family:'Fredoka One',cursive;font-size:2.2rem;color:var(--green-dark);}
.login-logo h1 span{color:var(--amber);}
.login-logo p{color:var(--muted);font-size:.9rem;margin-top:4px;}
.login-box{background:var(--card);border-radius:24px;padding:1.8rem;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.08);border:1px solid var(--border);}
.role-tabs{display:flex;background:#F0EDE0;border-radius:12px;padding:3px;gap:3px;margin-bottom:1.2rem;}
.rtab{flex:1;padding:8px;border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.85rem;cursor:pointer;background:transparent;color:var(--muted);transition:.15s;}
.rtab.active{background:var(--card);color:var(--green-dark);box-shadow:0 1px 6px rgba(0,0,0,.08);}
.field{margin-bottom:.9rem;}
.field label{font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px;}
.field input,.field textarea,.field select{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:11px;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:600;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--green);background:#fff;}
.field textarea{min-height:75px;resize:none;}
.btn{width:100%;padding:12px;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.95rem;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-primary{background:var(--green);color:#fff;}
.btn-primary:active{background:var(--green-dark);}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--muted);margin-top:.6rem;}
.btn-ghost:active{background:var(--bg);}
.btn-sun{background:var(--amber);color:#fff;}
.btn-sun:active{background:#e08c1e;}
.err{background:#FFEBEE;color:#C62828;border-radius:10px;padding:9px 12px;font-size:.85rem;font-weight:700;margin-bottom:.8rem;}

/* TOPBAR */
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.topbar-left h2{font-family:'Fredoka One',cursive;font-size:1.2rem;color:var(--green-dark);}
.topbar-left p{font-size:.78rem;color:var(--muted);margin-top:1px;}
.role-pill{font-size:.72rem;font-weight:800;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px;}
.pill-teacher{background:var(--green-light);color:var(--green-dark);}
.pill-parent{background:var(--blue-light);color:#185FA5;}

/* SCROLL */
.scroll-area{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;padding-bottom:80px;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.stat-card{background:var(--card);border-radius:14px;padding:12px 14px;border:1px solid var(--border);}
.stat-val{font-family:'Fredoka One',cursive;font-size:1.8rem;color:var(--text);}
.stat-lbl{font-size:.75rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-top:1px;}

/* SECTION */
.sec-label{font-size:.75rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;padding:4px 2px;}

/* CHILD CARD */
.child-card{background:var(--card);border-radius:var(--radius);padding:13px;border:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer;transition:.15s;}
.child-card:active{background:#F5F2E8;}
.av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;}
.child-info{flex:1;min-width:0;}
.child-name{font-weight:800;font-size:.95rem;color:var(--text);}
.child-meta{font-size:.78rem;color:var(--muted);margin-top:1px;}
.chip{display:inline-block;font-size:.72rem;font-weight:700;padding:2px 9px;border-radius:20px;margin-top:5px;}
.chip-green{background:var(--green-light);color:var(--green-dark);}
.chip-amber{background:var(--amber-light);color:#854F0B;}
.chip-blue{background:var(--blue-light);color:#185FA5;}
.upd-btn{padding:7px 12px;border:none;border-radius:9px;background:var(--green);color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:.78rem;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.upd-btn:active{background:var(--green-dark);}

/* UPDATE CARD */
.update-card{background:var(--card);border-radius:var(--radius);padding:13px;border:1px solid var(--border);}
.upd-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.upd-child{font-weight:800;font-size:.95rem;color:var(--green-dark);}
.upd-date{font-size:.75rem;color:var(--muted);}
.chips-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:7px;}
.upd-note{font-size:.88rem;color:var(--text);line-height:1.55;}
.upd-act{font-size:.8rem;color:var(--muted);margin-top:4px;font-style:italic;}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:20;}
.nav-btn{flex:1;padding:10px 4px 8px;border:none;background:none;cursor:pointer;font-family:'Nunito',sans-serif;font-size:.72rem;font-weight:700;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:2px;transition:.15s;}
.nav-btn.active{color:var(--green);}
.nav-icon{font-size:1.3rem;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.modal-box{background:var(--card);border-radius:24px 24px 0 0;padding:20px 16px;width:100%;max-width:430px;max-height:88vh;overflow-y:auto;}
.modal-title{font-family:'Fredoka One',cursive;font-size:1.3rem;color:var(--green-dark);margin-bottom:1.2rem;}
.mood-row{display:flex;gap:6px;}
.mood-opt{flex:1;padding:9px 4px;border:1.5px solid var(--border);border-radius:11px;text-align:center;cursor:pointer;font-size:1.4rem;transition:.15s;background:var(--bg);}
.mood-opt span{display:block;font-size:.68rem;font-weight:700;color:var(--muted);margin-top:2px;}
.mood-opt.sel{border-color:var(--green);border-width:2px;background:var(--green-light);}
.tog-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.tog-lbl{font-weight:700;font-size:.95rem;}
.tog{position:relative;width:42px;height:23px;}
.tog input{opacity:0;width:0;height:0;}
.tog-sl{position:absolute;inset:0;background:#D0CDB8;border-radius:23px;cursor:pointer;transition:.2s;}
.tog-sl::before{content:'';position:absolute;height:17px;width:17px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.tog input:checked+.tog-sl{background:var(--green);}
.tog input:checked+.tog-sl::before{transform:translateX(19px);}
.modal-actions{display:flex;gap:8px;margin-top:1.2rem;}
.modal-actions .btn{flex:1;}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--green-dark);color:#fff;padding:10px 20px;border-radius:12px;font-weight:700;font-size:.88rem;z-index:200;animation:fadeInOut 2.5s forwards;}
@keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(-8px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}80%{opacity:1}100%{opacity:0}}
.empty-state{text-align:center;padding:2.5rem 1rem;color:var(--muted);}
.empty-icon{font-size:2.5rem;margin-bottom:.7rem;}
.empty-state p{font-size:.9rem;line-height:1.5;}
</style>
</head>
<body>
<div id="app">

<!-- LOGIN -->
<div id="s-login" class="screen active">
  <div class="login-page">
    <div class="login-logo">
      <span class="login-icon">🌟</span>
      <h1>Kid<span>Track</span></h1>
      <p>Keeping families connected to the classroom</p>
    </div>
    <div class="login-box">
      <div class="role-tabs">
        <button class="rtab active" onclick="setRole('teacher',this)">📚 Teacher</button>
        <button class="rtab" onclick="setRole('parent',this)">👪 Parent</button>
      </div>
      <div id="login-err" class="err" style="display:none;"></div>
      <div class="field"><label>Email</label><input type="email" id="l-email" placeholder="email@school.com"/></div>
      <div class="field"><label>Password</label><input type="password" id="l-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
      <button class="btn btn-primary" onclick="doLogin()">Login →</button>
      <button class="btn btn-ghost" onclick="doDemo()">Try demo</button>
    </div>
  </div>
</div>

<!-- TEACHER -->
<div id="s-teacher" class="screen">
  <div class="topbar">
    <div class="topbar-left">
      <h2>🌟 KidTrack</h2>
      <p id="t-school">Sunshine Kindergarten</p>
    </div>
    <span class="role-pill pill-teacher">Teacher</span>
  </div>
  <div class="scroll-area" id="t-scroll"></div>
  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="tTab('children',this)" id="tnav-children"><span class="nav-icon">👦</span>Children</button>
    <button class="nav-btn" onclick="tTab('today',this)" id="tnav-today"><span class="nav-icon">📋</span>Today</button>
    <button class="nav-btn" onclick="doLogout()"><span class="nav-icon">↩</span>Logout</button>
  </nav>
</div>

<!-- PARENT -->
<div id="s-parent" class="screen">
  <div class="topbar">
    <div class="topbar-left">
      <h2 id="p-child-name">Emma Mukasa</h2>
      <p id="p-school">Sunshine Kindergarten · Class A</p>
    </div>
    <span class="role-pill pill-parent">Parent</span>
  </div>
  <div class="scroll-area" id="p-scroll"></div>
  <nav class="bottom-nav">
    <button class="nav-btn active"><span class="nav-icon">📖</span>Updates</button>
    <button class="nav-btn" onclick="doLogout()"><span class="nav-icon">↩</span>Logout</button>
  </nav>
</div>

<!-- UPDATE MODAL -->
<div id="update-modal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <div class="modal-title">📝 Update for <span id="modal-name"></span></div>
    <div class="field">
      <label>Mood today</label>
      <div class="mood-row">
        <div class="mood-opt sel" onclick="selMood(this,0)">😄<span>Happy</span></div>
        <div class="mood-opt" onclick="selMood(this,1)">🙂<span>Okay</span></div>
        <div class="mood-opt" onclick="selMood(this,2)">😢<span>Sad</span></div>
        <div class="mood-opt" onclick="selMood(this,3)">😴<span>Tired</span></div>
      </div>
    </div>
    <div class="tog-row"><span class="tog-lbl">🍽️ Ate well</span><label class="tog"><input type="checkbox" id="tog-ate" checked/><span class="tog-sl"></span></label></div>
    <div class="tog-row" style="margin-bottom:10px;"><span class="tog-lbl">😴 Took a nap</span><label class="tog"><input type="checkbox" id="tog-nap"/><span class="tog-sl"></span></label></div>
    <div class="field"><label>Activities</label><input type="text" id="m-act" placeholder="Drawing, singing, outdoor play..."/></div>
    <div class="field"><label>Notes for parents</label><textarea id="m-notes" placeholder="How was their day? Anything to share..."></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveUpdate()">✓ Save</button>
    </div>
  </div>
</div>

<script>
var currentRole = 'teacher';
var selectedMood = 0;
var currentChild = '';
var DB = {
  children: [
    {id:1, name:'Emma Mukasa', age:4, avatar:'👧', color:'#E1F5EE', updatedToday:true},
    {id:2, name:'David Ssali', age:5, avatar:'👦', color:'#E6F1FB', updatedToday:false},
    {id:3, name:'Aisha Nakato', age:4, avatar:'👧', color:'#FFF3DC', updatedToday:true},
    {id:4, name:'Brian Otieno', age:5, avatar:'👦', color:'#FBEAF0', updatedToday:false},
    {id:5, name:'Grace Nakimuli', age:3, avatar:'👧', color:'#E1F5EE', updatedToday:true},
  ],
  todayUpdates: [
    {id:1, child_id:1, childName:'Emma Mukasa', mood:'😄 Happy', ate:true, nap:true, note:'Emma had a wonderful day! She made a new friend and was very confident during story time.', act:'Drawing, singing, outdoor play'},
    {id:2, child_id:3, childName:'Aisha Nakato', mood:'🙂 Okay', ate:true, nap:false, note:'Aisha was a bit quiet today but participated well in group activities.', act:'Painting, reading'},
    {id:3, child_id:5, childName:'Grace Nakimuli', mood:'😄 Happy', ate:true, nap:true, note:'Grace was full of energy today and loved the music session.', act:'Music, outdoor play'},
  ],
  parentUpdates: [
    {date:'Today', mood:'😄 Happy', ate:true, nap:true, note:'Emma had a wonderful day! She made a new friend and was very confident during story time. She finished all her lunch and slept well during nap time.', act:'Drawing, singing, outdoor play'},
    {date:'Yesterday', mood:'🙂 Okay', ate:true, nap:false, note:'Emma was a little quiet today but participated well in group activities. She enjoyed painting class and showed great creativity.', act:'Painting, reading'},
    {date:'Mon, Apr 21', mood:'😄 Happy', ate:true, nap:true, note:'Excellent day for Emma. She helped her classmates during art time and was very kind and sharing.', act:'Art, outdoor games'},
    {date:'Fri, Apr 18', mood:'😴 Tired', ate:false, nap:true, note:"Emma seemed a bit under the weather today. She didn't eat much but rested well. Please monitor at home.", act:'Light activities only'},
  ]
};

function setRole(r, el){
  currentRole = r;
  document.querySelectorAll('.rtab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>{s.classList.remove('active');s.style.display='none';});
  var s=document.getElementById(id);
  s.style.display='flex';
  setTimeout(()=>s.classList.add('active'),10);
}

function doLogin(){
  var e=document.getElementById('l-email').value;
  var p=document.getElementById('l-pass').value;
  var err=document.getElementById('login-err');
  if(!e||!p){err.style.display='block';err.textContent='⚠️ Please enter email and password';return;}
  err.style.display='none';
  if(currentRole==='teacher') renderTeacher();
  else renderParent();
}

function doDemo(){
  if(currentRole==='teacher') renderTeacher();
  else renderParent();
}

function doLogout(){showScreen('s-login');}

function renderTeacher(){
  showScreen('s-teacher');
  tTab('children', document.getElementById('tnav-children'));
}

function tTab(tab, el){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  var sc = document.getElementById('t-scroll');
  if(tab==='children'){
    var updated = DB.children.filter(c=>c.updatedToday).length;
    var pending = DB.children.length - updated;
    var html = '<div class="stats-grid">'
      +'<div class="stat-card"><div class="stat-val">'+DB.children.length+'</div><div class="stat-lbl">Children</div></div>'
      +'<div class="stat-card"><div class="stat-val">'+updated+'</div><div class="stat-lbl">Updated today</div></div>'
      +'<div class="stat-card"><div class="stat-val">'+pending+'</div><div class="stat-lbl">Pending</div></div>'
      +'<div class="stat-card"><div class="stat-val">'+DB.todayUpdates.length+'</div><div class="stat-lbl">Updates sent</div></div>'
      +'</div>';
    html += '<div class="sec-label">Your class</div>';
    DB.children.forEach(function(c){
      html += '<div class="child-card">'
        +'<div class="av" style="background:'+c.color+'">'+c.avatar+'</div>'
        +'<div class="child-info">'
        +'<div class="child-name">'+c.name+'</div>'
        +'<div class="child-meta">Age '+c.age+'</div>'
        +(c.updatedToday ? '<span class="chip chip-green">✅ Updated today</span>' : '<span class="chip chip-amber">⏳ Needs update</span>')
        +'</div>'
        +'<button class="upd-btn" onclick="openModal(\''+c.name+'\')">+ Update</button>'
        +'</div>';
    });
    sc.innerHTML = html;
  } else {
    var html2 = '<div class="sec-label">Today\'s updates</div>';
    DB.todayUpdates.forEach(function(u){
      html2 += '<div class="update-card">'
        +'<div class="upd-header"><span class="upd-child">'+u.childName+'</span><span class="upd-date">Today</span></div>'
        +'<div class="chips-row">'
        +'<span class="chip chip-amber">'+u.mood+'</span>'
        +(u.ate?'<span class="chip chip-green">🍽️ Ate well</span>':'<span class="chip chip-blue">🍽️ Ate little</span>')
        +(u.nap?'<span class="chip chip-blue">😴 Napped</span>':'')
        +'</div>'
        +'<div class="upd-note">'+u.note+'</div>'
        +'<div class="upd-act">🎨 '+u.act+'</div>'
        +'</div>';
    });
    if(DB.todayUpdates.length===0){
      html2 += '<div class="empty-state"><div class="empty-icon">📋</div><p>No updates posted yet today</p></div>';
    }
    sc.innerHTML = html2;
  }
}

function renderParent(){
  showScreen('s-parent');
  var sc = document.getElementById('p-scroll');
  var html = '<div class="stats-grid">'
    +'<div class="stat-card"><div class="stat-val">😄</div><div class="stat-lbl">Today\'s mood</div></div>'
    +'<div class="stat-card"><div class="stat-val">'+DB.parentUpdates.length+'</div><div class="stat-lbl">Total updates</div></div>'
    +'</div>';
  html += '<div class="sec-label">Emma\'s updates</div>';
  DB.parentUpdates.forEach(function(u){
    html += '<div class="update-card">'
      +'<div class="upd-header"><span class="upd-child">Emma Mukasa</span><span class="upd-date">'+u.date+'</span></div>'
      +'<div class="chips-row">'
      +'<span class="chip chip-amber">'+u.mood+'</span>'
      +(u.ate?'<span class="chip chip-green">🍽️ Ate well</span>':'<span class="chip chip-blue">🍽️ Ate little</span>')
      +(u.nap?'<span class="chip chip-blue">😴 Napped</span>':'')
      +'</div>'
      +'<div class="upd-note">'+u.note+'</div>'
      +'<div class="upd-act">🎨 '+u.act+'</div>'
      +'</div>';
  });
  sc.innerHTML = html;
}

function openModal(name){
  currentChild = name;
  document.getElementById('modal-name').textContent = name;
  document.getElementById('m-act').value = '';
  document.getElementById('m-notes').value = '';
  document.getElementById('tog-ate').checked = true;
  document.getElementById('tog-nap').checked = false;
  document.querySelectorAll('.mood-opt').forEach(m=>m.classList.remove('sel'));
  document.querySelectorAll('.mood-opt')[0].classList.add('sel');
  selectedMood = 0;
  document.getElementById('update-modal').style.display = 'flex';
}

function closeModal(){
  document.getElementById('update-modal').style.display = 'none';
}

function selMood(el, idx){
  document.querySelectorAll('.mood-opt').forEach(m=>m.classList.remove('sel'));
  el.classList.add('sel');
  selectedMood = idx;
}

function saveUpdate(){
  closeModal();
  DB.children.forEach(function(c){ if(c.name===currentChild) c.updatedToday=true; });
  showToast('✅ Update saved — parent notified!');
  tTab('children', document.getElementById('tnav-children'));
}

function showToast(msg){
  var t=document.createElement('div');
  t.className='toast';
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2600);
}
</script>
<script>if("serviceWorker" in navigator)navigator.serviceWorker.register("/sw.js");</script></body>
</html>
